:root{--bg:#020617;--surface:rgba(255,255,255,.03);--border:rgba(255,255,255,.06);--border-hover:rgba(34,211,238,.3);--text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b;--cyan:#22d3ee;--cyan-glow:rgba(34,211,238,.15)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column}
::selection{background:var(--cyan-glow);color:#fff}
.header{position:relative;overflow:hidden;text-align:center;padding:3.5rem 1rem 2rem}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(120,119,198,.3),transparent);pointer-events:none}
.logo{display:inline-block;font-size:clamp(2.5rem,6vw,3.8rem);font-weight:900;letter-spacing:-.02em;background:linear-gradient(135deg,#22d3ee,#818cf8,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;text-decoration:none;transition:opacity .2s}
.logo:hover{opacity:.85}
.subtitle{margin-top:.5rem;font-size:clamp(.95rem,2vw,1.25rem);color:var(--text-dim);font-weight:500}
.note{margin-top:.5rem;font-size:.8rem;color:var(--text-muted);max-width:36rem;margin-left:auto;margin-right:auto;line-height:1.6}
.search-wrap{position:relative;max-width:26rem;margin:1.5rem auto 0}
.search-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);width:1.1rem;height:1.1rem;color:var(--text-muted);pointer-events:none}
.search{width:100%;padding:.7rem 1rem .7rem 2.6rem;border-radius:9999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:.875rem;outline:none;backdrop-filter:blur(12px);transition:border-color .2s,box-shadow .2s}
.search::placeholder{color:var(--text-muted)}
.search:focus{border-color:rgba(34,211,238,.5);box-shadow:0 0 0 3px rgba(34,211,238,.12)}
.pills{display:flex;flex-wrap:wrap;justify-content:center;gap:.4rem;margin-top:1.2rem;padding:0 .5rem}
.pill{border:none;border-radius:9999px;padding:.35rem .9rem;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.05);color:var(--text-muted)}
.pill:hover{background:rgba(255,255,255,.1);color:var(--text-dim)}
.pill.active{background:var(--cyan-glow);color:var(--cyan);box-shadow:inset 0 0 0 1px rgba(34,211,238,.4)}
.main{max-width:76rem;margin:0 auto;padding:1rem 1rem 4rem;width:100%;flex:1}
.region-section{margin-bottom:2.5rem}
.region-title{font-size:1rem;font-weight:600;color:var(--text-dim);margin-bottom:1rem;letter-spacing:.03em}
.region-count{font-size:.8rem;font-weight:400;color:var(--text-muted);margin-left:.4rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.6rem}
@media(min-width:640px){.grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
.card{display:flex;flex-direction:column;align-items:center;gap:.3rem;padding:1rem .5rem;border-radius:.75rem;border:1px solid var(--border);background:var(--surface);backdrop-filter:blur(6px);text-decoration:none;text-align:center;transition:transform .18s,border-color .18s,background .18s,box-shadow .18s;cursor:pointer}
.card:hover{transform:scale(1.04);border-color:var(--border-hover);background:rgba(255,255,255,.07);box-shadow:0 8px 24px rgba(34,211,238,.06)}
.card-code{font-size:.95rem;font-weight:800;letter-spacing:.08em;color:var(--cyan);transition:color .18s}
.card:hover .card-code{color:#67e8f9}
.card-native{font-size:.95rem;font-weight:600;color:rgba(255,255,255,.9)}
.card:hover .card-native{color:#fff}
.card-en{font-size:.95rem;font-weight:600;color:rgba(255,255,255,.9)}
.card:hover .card-en{color:#fff}
.card-country{font-size:.6rem;color:var(--text-muted);opacity:.7}
.card:hover .card-country{opacity:1}
.empty{text-align:center;padding:4rem 1rem;color:var(--text-muted);font-size:1rem}
.footer{border-top:1px solid rgba(255,255,255,.05);padding:1.5rem 1rem;text-align:center;font-size:.7rem;color:var(--text-muted);line-height:1.7}
.footer a{color:var(--text-dim);text-decoration:none;transition:color .2s}
.footer a:hover{color:#fff}

{g:"nso",n:"Northern Sotho",t:"Sepedi",a:"SEPEDI",r:"Africa",c:"South Africa"},
{g:"ts",n:"Tsonga",t:"Xitsonga",a:"TSONGA",r:"Africa",c:"South Africa"},
{g:"tn",n:"Tswana",t:"Setswana",a:"BOTSWA",r:"Africa",c:"Botswana"},
{g:"ss",n:"Swati",t:"siSwati",a:"ESWAT",r:"Africa",c:"Eswatini"},
{g:"nr",n:"Ndebele (South)",t:"isiNdebele",a:"NDEB",r:"Africa",c:"South Africa"},
{g:"ht",n:"Haitian Creole",t:"Krey\u00F2l ayisyen",a:"HAITI",r:"Americas",c:"Haiti"},
{g:"gn",n:"Guarani",t:"Ava\u00F1e'\u1EBD",a:"PARA",r:"Americas",c:"Paraguay"},
{g:"qu",n:"Quechua",t:"Runasimi",a:"PERU",r:"Americas",c:"Peru"},
{g:"ay",n:"Aymara",t:"Aymar aru",a:"BOLIV",r:"Americas",c:"Bolivia"},
{g:"haw",n:"Hawaiian",t:"\u02BB\u014Clelo Hawai\u02BBi",a:"HAWAII",r:"Americas",c:"USA (Hawaii)"},
{g:"mi",n:"Maori",t:"Te Reo M\u0101ori",a:"NZ",r:"Pacific",c:"New Zealand"},
{g:"sm",n:"Samoan",t:"Gagana Samoa",a:"SAMOA",r:"Pacific",c:"Samoa"},
{g:"fj",n:"Fijian",t:"Na Vosa Vakaviti",a:"FIJI",r:"Pacific",c:"Fiji"}
];

var REGIONS=["Asia","Europe","Americas","Middle East","Africa","Pacific"];
var REGION_LABELS={
  "Asia":"Asia",
  "Europe":"Europe",
  "Americas":"Americas",
  "Middle East":"Middle East & Central Asia",
  "Africa":"Africa",
  "Pacific":"Pacific"
};
var ABC_KEY="ABC";
var ABC_LABEL="ABC (A-Z)";

function makeUrl(gc){
  if(gc==="ja") return "https://audiocafe.tokyo/top/";
  return "https://audiocafe-tokyo.translate.goog/top/?_x_tr_sl=ja&_x_tr_tl="+encodeURIComponent(gc)+"&_x_tr_hl=ja&_x_tr_pto=wapp";
}

var searchEl=document.getElementById("search");
var pillsEl=document.getElementById("pills");
var mainEl=document.getElementById("main");
var activeRegion="all";

function buildPills(){
  var h='<button class="pill active" data-r="all">All</button>';
  h+='<button class="pill" data-r="'+ABC_KEY+'">'+ABC_LABEL+'</button>';
  for(var i=0;i<REGIONS.length;i++){
    h+='<button class="pill" data-r="'+REGIONS[i]+'">'+REGION_LABELS[REGIONS[i]]+'</button>';
  }
  pillsEl.innerHTML=h;
  var btns=pillsEl.querySelectorAll(".pill");
  for(var j=0;j<btns.length;j++){
    (function(b){
      b.addEventListener("click",function(){
        activeRegion=b.getAttribute("data-r");
        var all=pillsEl.querySelectorAll(".pill");
        for(var k=0;k<all.length;k++) all[k].className="pill";
        b.className="pill active";
        render();
      });
    })(btns[j]);
  }
}

function render(){
  var q=(searchEl.value||"").toLowerCase().trim();
  var base=L;
  if(activeRegion!=="all"&&activeRegion!==ABC_KEY){
    base=[];
    for(var i=0;i<L.length;i++){if(L[i].r===activeRegion)base.push(L[i]);}
  }
  var items=[];
  for(var i=0;i<base.length;i++){
    var c=base[i];
    if(!q||c.n.toLowerCase().indexOf(q)!==-1||c.t.toLowerCase().indexOf(q)!==-1||c.g.toLowerCase().indexOf(q)!==-1||c.c.toLowerCase().indexOf(q)!==-1||c.a.toLowerCase().indexOf(q)!==-1){
      items.push(c);
    }
  }
  if(!items.length){mainEl.innerHTML='<p class="empty">No languages found.</p>';return;}

  var html="";

  if(activeRegion===ABC_KEY){
    var sorted=items.slice().sort(function(a,b){
      var x=a.n.toLowerCase(),y=b.n.toLowerCase();
      return x<y?-1:x>y?1:0;
    });
    var groups={},letters=[];
    for(var i=0;i<sorted.length;i++){
      var letter=sorted[i].n.charAt(0).toUpperCase();
      if(!groups[letter]){groups[letter]=[];letters.push(letter);}
      groups[letter].push(sorted[i]);
    }
    letters.sort();
    for(var i=0;i<letters.length;i++){
      var arr=groups[letters[i]];
      html+='<section class="region-section"><h2 class="region-title">'+esc(letters[i])+'<span class="region-count">('+arr.length+')</span></h2><div class="grid">';
      for(var j=0;j<arr.length;j++) html+=cardHtml(arr[j]);
      html+='</div></section>';
    }
  }else{
    var order=activeRegion==="all"?REGIONS:[activeRegion];
    var grouped={};
    for(var i=0;i<order.length;i++) grouped[order[i]]=[];
    for(var i=0;i<items.length;i++){
      var r=items[i].r;
      if(!grouped[r]) grouped[r]=[];
      grouped[r].push(items[i]);
    }
    for(var i=0;i<order.length;i++){
      var arr=grouped[order[i]];
      if(!arr||!arr.length) continue;
      html+='<section class="region-section"><h2 class="region-title">'+REGION_LABELS[order[i]]+'<span class="region-count">('+arr.length+')</span></h2><div class="grid">';
      for(var j=0;j<arr.length;j++) html+=cardHtml(arr[j]);
      html+='</div></section>';
    }
  }
  mainEl.innerHTML=html;
}

function cardHtml(c){
  return '<a class="card" href="'+makeUrl(c.g)+'" target="_blank" rel="noopener noreferrer">'
    +'<span class="card-code">'+esc(c.a)+'</span>'
    +'<span class="card-native">'+esc(c.t)+'</span>'
    +'<span class="card-en">'+esc(c.n)+'</span>'
    +'<span class="card-country">'+esc(c.c)+'</span>'
    +'</a>';
}

function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}

searchEl.addEventListener("input",function(){render();});
buildPills();
render();
})();
</script>
</body>
</html>
